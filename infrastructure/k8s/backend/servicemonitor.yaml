# ServiceMonitor for batchivo backend Prometheus scraping
#
# Requires: Prometheus Operator (kube-prometheus-stack or similar) in the cluster.
# The label `release: kube-prometheus-stack` must match your Prometheus instance's
# serviceMonitorSelector. Verify with:
#   kubectl get prometheus -A -o jsonpath='{.items[*].spec.serviceMonitorSelector}'
#
# The backend exposes OpenTelemetry metrics at port 9090 (prometheus_client HTTP server).
# NetworkPolicy `20-backend-policy.yaml` already permits ingress from the `prometheus`
# namespace on port 9090.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: batchivo-backend
  namespace: batchivo
  labels:
    # This label must match the Prometheus CR's serviceMonitorSelector.
    # Default for kube-prometheus-stack installs:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: backend
  namespaceSelector:
    matchNames:
      - batchivo
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
