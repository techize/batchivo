---
# Cloudflared egress to Cloudflare edge
# Allows both QUIC (UDP 7844) and HTTP/2 fallback (TCP 7844), plus HTTPS (TCP 443)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-egress
  namespace: batchivo
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 7844
          protocol: UDP
        - port: 7844
          protocol: TCP
---
# Cloudflared egress to internal app services (to proxy inbound requests)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-to-apps
  namespace: batchivo
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 8080
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app: frontend
    - ports:
        - port: 8000
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app: backend
