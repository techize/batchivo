# MinIO Network Policy
# MinIO provides S3-compatible object storage for images
#
# Ingress:
#   - Backend pods (for image upload/retrieval)
#   - MinIO client jobs (for bucket management)
#
# Egress:
#   - Not restricted (MinIO must be able to respond to TCP connections)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-policy
  namespace: batchivo
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress from backend for API access
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 9000  # S3 API
    # Allow ingress from bucket-creator jobs (minio-create-bucket, minio-create-staging-bucket)
    - from:
        - podSelector:
            matchLabels:
              role: bucket-creator
      ports:
        - protocol: TCP
          port: 9000
    # Allow console access via port-forward (local admin only)
    - from:
        - podSelector: {}  # Any pod in namespace (port-forward only reachable locally)
      ports:
        - protocol: TCP
          port: 9001
