# Builds and pushes the CI test image (batchivo/ci-python:3.12).
# Triggers when Dockerfile.ci, pyproject.toml, or poetry.lock change so
# pre-installed dependencies stay in sync with the lock file.

when:
  - event: push
    branch: main
    path:
      - 'backend/Dockerfile.ci'
      - 'backend/pyproject.toml'
      - 'backend/poetry.lock'

steps:
  build-ci-image:
    image: registry.techize.co.uk/dockerhub-cache/moby/buildkit:latest
    environment:
      REGISTRY_USERNAME:
        from_secret: docker_username
      REGISTRY_PASSWORD:
        from_secret: docker_password
    commands:
      - mkdir -p /root/.docker
      - printf '{"auths":{"registry.techize.co.uk":{"auth":"%s"}}}' "$(printf '%s:%s' "$REGISTRY_USERNAME" "$REGISTRY_PASSWORD" | base64 | tr -d '\n')" > /root/.docker/config.json
      - |
        buildctl --addr tcp://buildkitd.woodpecker.svc:1234 build \
          --frontend=dockerfile.v0 \
          --opt filename=Dockerfile.ci \
          --local context=backend \
          --local dockerfile=backend \
          --output type=image,"name=registry.techize.co.uk/batchivo/ci-python:3.12;registry.techize.co.uk/batchivo/ci-python:latest",push=true
