# Builds and pushes the CI test image (batchivo/ci-python:3.12).
# Triggers when Dockerfile.ci, pyproject.toml, or poetry.lock change so
# pre-installed dependencies stay in sync with the lock file.

when:
  - event: push
    branch: main
    path:
      - 'backend/Dockerfile.ci'
      - 'backend/pyproject.toml'
      - 'backend/poetry.lock'

steps:
  build-ci-image:
    image: plugins/kaniko
    settings:
      repo: registry.techize.co.uk/batchivo/ci-python
      dockerfile: backend/Dockerfile.ci
      context: backend
      tags:
        - "3.12"
        - latest
      registry: registry.techize.co.uk
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
