# Woodpecker CI — Build + Deploy Pipeline
#
# Purpose: Get code live as fast as possible.
#          This pipeline does ONE thing: build images and update manifests.
#          Tests, dep scans, and image scans all run concurrently in test.yml.
#
# Architecture:
#   build-backend  ──┐
#   build-frontend ──┴──> deploy-staging ──> deploy-production
#
# Expected time: ~4-7 min on warm Kaniko cache (code-only change)
#                ~8-12 min on cold cache (dep change)
#
# Triggered by: push to main (excluding k8s-only changes — ArgoCD handles those directly)

when:
  - event: push
    branch: main
    path:
      exclude:
        - 'infrastructure/k8s/**'

steps:
  # ============================================
  # Build Docker Images (parallel)
  #
  # Uses buildctl to send builds directly to the BuildKit daemon at
  # buildkitd.woodpecker.svc:1234. No Docker socket or privileged mode needed.
  # Layer cache is stored in the daemon's 20Gi PVC — code-only changes skip
  # the heavy dependency layers entirely (poetry install, npm ci).
  # ============================================
  build-backend:
    image: registry.techize.co.uk/dockerhub-cache/moby/buildkit:latest
    environment:
      REGISTRY_USERNAME:
        from_secret: docker_username
      REGISTRY_PASSWORD:
        from_secret: docker_password
    commands:
      - mkdir -p /root/.docker
      - printf '{"auths":{"registry.techize.co.uk":{"auth":"%s"}}}' "$(printf '%s:%s' "$REGISTRY_USERNAME" "$REGISTRY_PASSWORD" | base64 | tr -d '\n')" > /root/.docker/config.json
      - |
        buildctl --addr tcp://buildkitd.woodpecker.svc:1234 build \
          --frontend=dockerfile.v0 \
          --opt filename=Dockerfile \
          --local context=backend \
          --local dockerfile=backend \
          --import-cache type=registry,ref=registry.techize.co.uk/batchivo/batchivo-backend-cache \
          --export-cache type=registry,ref=registry.techize.co.uk/batchivo/batchivo-backend-cache,mode=max \
          --output type=image,"name=registry.techize.co.uk/batchivo/batchivo-backend:${CI_COMMIT_SHA};registry.techize.co.uk/batchivo/batchivo-backend:latest",push=true

  build-frontend:
    image: registry.techize.co.uk/dockerhub-cache/moby/buildkit:latest
    environment:
      REGISTRY_USERNAME:
        from_secret: docker_username
      REGISTRY_PASSWORD:
        from_secret: docker_password
    commands:
      - mkdir -p /root/.docker
      - printf '{"auths":{"registry.techize.co.uk":{"auth":"%s"}}}' "$(printf '%s:%s' "$REGISTRY_USERNAME" "$REGISTRY_PASSWORD" | base64 | tr -d '\n')" > /root/.docker/config.json
      - |
        buildctl --addr tcp://buildkitd.woodpecker.svc:1234 build \
          --frontend=dockerfile.v0 \
          --opt filename=Dockerfile \
          --opt build-arg:VITE_API_URL=https://api.batchivo.com \
          --local context=frontend \
          --local dockerfile=frontend \
          --import-cache type=registry,ref=registry.techize.co.uk/batchivo/batchivo-frontend-cache \
          --export-cache type=registry,ref=registry.techize.co.uk/batchivo/batchivo-frontend-cache,mode=max \
          --output type=image,"name=registry.techize.co.uk/batchivo/batchivo-frontend:${CI_COMMIT_SHA};registry.techize.co.uk/batchivo/batchivo-frontend:latest",push=true

  # ============================================
  # Deploy to Staging
  # Updates k8s manifest → ArgoCD auto-syncs the rest
  # ============================================
  deploy-staging:
    image: registry.techize.co.uk/dockerhub-cache/alpine/git:latest
    depends_on:
      - build-backend
      - build-frontend
    environment:
      GIT_AUTHOR_NAME: woodpecker-ci[bot]
      GIT_AUTHOR_EMAIL: woodpecker-ci[bot]@batchivo
      GIT_COMMITTER_NAME: woodpecker-ci[bot]
      GIT_COMMITTER_EMAIL: woodpecker-ci[bot]@batchivo
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache sed curl
      - cd /woodpecker/src/github.com/techize/batchivo
      - echo "=== Deploying to STAGING ==="
      - 'sed -i "s|image: registry.techize.co.uk/batchivo/batchivo-backend:.*|image: registry.techize.co.uk/batchivo/batchivo-backend:$CI_COMMIT_SHA|g" infrastructure/k8s/staging/deployment.yaml'
      - git config --global --add safe.directory /woodpecker/src/github.com/techize/batchivo
      - git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/techize/batchivo.git
      - git add infrastructure/k8s/staging/deployment.yaml
      - |
        for i in 1 2 3; do
          git pull --rebase origin main || true
          git diff --staged --quiet && echo "No staging changes to commit" && exit 0
          if git commit -m "cd(staging): update backend image to $CI_COMMIT_SHA" && git push origin main; then
            echo "Successfully pushed staging manifest update"
            exit 0
          fi
          echo "Attempt $i failed, retrying in 5s..."
          git reset HEAD~1 2>/dev/null || true
          sleep 5
        done
        echo "Failed after 3 attempts"
        exit 1

  # ============================================
  # Deploy to Production
  # Updates both backend + frontend manifests → ArgoCD syncs
  # ============================================
  deploy-production:
    image: registry.techize.co.uk/dockerhub-cache/alpine/git:latest
    depends_on:
      - deploy-staging
    environment:
      GIT_AUTHOR_NAME: woodpecker-ci[bot]
      GIT_AUTHOR_EMAIL: woodpecker-ci[bot]@batchivo
      GIT_COMMITTER_NAME: woodpecker-ci[bot]
      GIT_COMMITTER_EMAIL: woodpecker-ci[bot]@batchivo
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache sed
      - cd /woodpecker/src/github.com/techize/batchivo
      - echo "=== Deploying to PRODUCTION ==="
      - 'sed -i "s|image: registry.techize.co.uk/batchivo/batchivo-backend:.*|image: registry.techize.co.uk/batchivo/batchivo-backend:$CI_COMMIT_SHA|g" infrastructure/k8s/backend/deployment.yaml'
      - 'sed -i "s|image: registry.techize.co.uk/batchivo/batchivo-frontend:.*|image: registry.techize.co.uk/batchivo/batchivo-frontend:$CI_COMMIT_SHA|g" infrastructure/k8s/frontend/deployment.yaml'
      - git config --global --add safe.directory /woodpecker/src/github.com/techize/batchivo
      - git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/techize/batchivo.git
      - git add infrastructure/k8s/backend/deployment.yaml infrastructure/k8s/frontend/deployment.yaml
      - |
        for i in 1 2 3; do
          git pull --rebase origin main || true
          git diff --staged --quiet && echo "No production changes to commit" && exit 0
          if git commit -m "cd(prod): update image tags to $CI_COMMIT_SHA" && git push origin main; then
            echo "Successfully pushed production manifest update"
            exit 0
          fi
          echo "Attempt $i failed, retrying in 5s..."
          git reset HEAD~1 2>/dev/null || true
          sleep 5
        done
        echo "Failed after 3 attempts"
        exit 1

# Notes:
# - Staging health check removed — staging.batchivo.com DNS not yet configured, was wasting 60s per run.
#   Re-add once staging is live: poll https://staging.batchivo.com/health between the two deploy steps.
# - Image security scans (Trivy) run in test.yml after tests complete — not a deploy gate here.
# - volumes disabled 2026-03-17 — Woodpecker agent next-bef0abaa4a DNS name bug
# - 2026-03-22 — if pipelines fail with "cannot ack workflow", restart woodpecker-server pod (SQLite queue corruption after 5+ days uptime)
